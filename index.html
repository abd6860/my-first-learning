<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Ride</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container" id="loginBox">
        <div class="logo-section">
            <h1>HB <span>Ride</span></h1>
            <h3>Welcome 🤝</h3>
            <p>Start Your Journey __🏎️</p>
        </div>

        <div class="illustration">
            <svg width="200" height="120" viewBox="0 0 200 120">
                <circle cx="100" cy="30" r="15" fill="#22c55e" opacity="0.3">
                    <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
                </circle>
                <path d="M100 15 L100 45" stroke="#22c55e" stroke-width="3"/>
                <path d="M70 80 L130 80 L140 95 L60 95 Z" fill="#22c55e"/>
                <circle cx="80" cy="95" r="8" fill="#333"/>
                <circle cx="120" cy="95" r="8" fill="#333"/>
            </svg>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <div class="phone-input">
                <select>
                    <option>+880</option>
                </select>
                <input type="tel" id="loginMobile" placeholder="Type Your Mobile Number">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-input">
                <input type="password" id="loginPass" placeholder="Type Your Password">
                <span class="toggle-eye" onclick="togglePass()">👁️</span>
            </div>
        </div>

        <p class="error" id="loginError"></p>

        <div class="forgot-link">
            <a onclick="showForgot()">Forgot your password? 🙄</a>
        </div>

        <button onclick="login()">Login</button>

        <div class="divider">
            <span>Or Login</span>
        </div>

        <div class="social-login">
            <button class="social-btn">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            </button>
            <button class="social-btn">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
        </div>

        <div class="signup-link">
            Don't have an account?🤔 <a onclick="showSignup()">Sign Up</a>
        </div>
    </div>

    <!-- Signup Box -->
    <div class="container hidden" id="signupBox">
        <div class="back-btn" onclick="showLogin()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </div>

        <div class="logo-section">
            <h1>HB <span>Ride</span></h1>
            <h3>Create New Account</h3>
            <p>Make Yor Account With Some Information</p>
        </div>

        <div class="illustration">
            <svg width="200" height="120" viewBox="0 0 200 120">
                <circle cx="100" cy="30" r="15" fill="#22c55e" opacity="0.3">
                    <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
                </circle>
                <path d="M100 15 L100 45" stroke="#22c55e" stroke-width="3"/>
                <path d="M70 80 L130 80 L140 95 L60 95 Z" fill="#22c55e"/>
                <circle cx="80" cy="95" r="8" fill="#333"/>
                <circle cx="120" cy="95" r="8" fill="#333"/>
            </svg>
        </div>

        <div class="form-group">
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" id="signupName" placeholder="Full Name">
            </div>
        </div>

        <div class="form-group">
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 0 0 0.7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                <select>
                    <option>+880</option>
                </select>
                <input type="tel" id="signupMobile" placeholder="Mobile Number">
            </div>
        </div>

        <div class="form-group">
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="signupPass" placeholder="Password">
                <span class="toggle-eye" onclick="toggleSignupPass1()">👁️</span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="signupConfirmPass" placeholder="Confirm Password">
                <span class="toggle-eye" onclick="toggleSignupPass2()">👁️</span>
            </div>
        </div>

        <p class="error" id="signupError"></p>
        <p class="success" id="signupSuccess"></p>

        <div class="checkbox-group">
            <input type="checkbox" id="termsCheck">
            <label for="termsCheck">I Agree To The Terms And Privacy Policy</label>
        </div>

        <button onclick="signup()">Sign Up</button>

        <div class="divider">
            <span>Or Sign Up</span>
        </div>

        <div class="social-login">
            <button class="social-btn">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            </button>
            <button class="social-btn">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
        </div>

        <div class="signup-link">
            Allready Have An Account? <a onclick="showLogin()">Login</a>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="container hidden" id="dashboard">
        <h1>Welcome <span id="userName"></span></h1>
        <p>Good Luck On Your Journey At HB Ride!</p>
        <button onclick="logout()">Log Out</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
