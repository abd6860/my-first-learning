<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Form -->
    <div class="container" id="loginBox">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Password">
        <p class="error" id="loginError"></p>
        <button onclick="login()">Login</button>
        <div class="link">
            <a onclick="showForgot()">Forgot Password?</a> |
            <a onclick="showSignup()">Sign Up</a>
        </div>
    </div>

    <!-- Signup Form -->
    <div class="container hidden" id="signupBox">
    <h2>Sign Up</h2>
    <input type="text" id="signupName" placeholder="Full Name">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPass" placeholder="Password">
    <p class="error" id="signupError"></p>
    <p class="success" id="signupSuccess"></p>
    <button onclick="signup()">Create Account</button>
    <div class="link">
        <a onclick="showLogin()">Already have account? Login</a>
    </div>
</div>

    <!-- Forgot Password Form -->
    <div class="container hidden" id="forgotBox">
        <h2>Reset Password</h2>
        <input type="email" id="forgotEmail" placeholder="Enter your email">
        <input type="password" id="newPass" placeholder="New Password">
        <p class="error" id="forgotError"></p>
        <p class="success" id="forgotSuccess"></p>
        <button onclick="resetPassword()">Reset Password</button>
        <div class="link">
            <a onclick="showLogin()">Back to Login</a>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="container hidden" id="dashboard">
        <h2>Welcome, <span id="userName"></span>!</h2>
        <p>Login Success</p>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
