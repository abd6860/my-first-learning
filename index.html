<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HB Ride - Passenger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">🚗 HB Ride</div>
    <div class="nav-right">
      <span id="userPhone" class="hidden"></span>
      <button class="nav-btn" id="loginBtn">login</button>
      <button class="nav-btn hidden" id="logoutBtn">Logout</button>
      <button class="hamburger" id="menuBtn">☰</button>
    </div>
  </div>
</nav>

<!-- Landing / Booking Section -->
<div id="landingPage">
  <section class="hero">
    <h1>Freedom in Every Journey</h1>
    <p>Premium car rental with professional drivers</p>
    
    <div class="booking-card" id="bookingCard">
      <div class="tabs">
        <button class="tab active">Car Rental</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Choose a Car</label>
          <select id="carSelect">
            <option value="">Select Car Type</option>
            <option value="Sedan">Sedan - ৳25/km</option>
            <option value="SUV">SUV - ৳35/km</option>
            <option value="Microbus">Microbus - ৳45/km</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pickup Location</label>
          <input type="text" id="pickup" placeholder="Enter pickup">
        </div>
        <div class="form-group">
          <label>Drop Location</label>
          <input type="text" id="drop" placeholder="Enter drop">
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="datetime">
        </div>
        <button class="search-btn" id="searchBtn">Search & Book</button>
      </div>
    </div>
  </section>

  <!-- Passenger Dashboard - hidden until login -->
  <section class="section hidden" id="dashboard">
    <h2 class="section-title">My Dashboard</h2>
    <div class="dashboard-grid">
      <div class="dash-card">
        <h3>📋 My Bookings</h3>
        <div id="bookingList">Loading...</div>
      </div>
      <div class="dash-card">
        <h3>👤 Profile</h3>
        <p><b>Phone:</b> <span id="profilePhone">-</span></p>
        <p><b>Status:</b> Verified Passenger</p>
      </div>
    </div>
  </section>
</div>

<!-- Login Modal with OTP -->
<div class="modal hidden" id="loginModal">
  <div class="modal-content">
    <div class="modal-header">
      login
      <button class="close-btn" id="closeModal">×</button>
    </div>
    <div class="modal-body" id="phoneStep">
      <label>Enter Your Phone Number</label>
      <div class="phone-input">
        <select><option>🇧🇩 +880</option></select>
        <input type="tel" id="phoneInput" placeholder="1XXXXXXXXX" maxlength="10">
      </div>
      <small>OTP যাবে এই নাম্বারে</small>
      <div id="recaptcha-container"></div>
      <button class="modal-btn" id="sendOtpBtn">Send Code</button>
    </div>
    <div class="modal-body hidden" id="otpStep">
      <label>Enter 6-digit OTP</label>
      <div class="otp-inputs">
        <input type="text" maxlength="1"><input type="text" maxlength="1">
        <input type="text" maxlength="1"><input type="text" maxlength="1">
        <input type="text" maxlength="1"><input type="text" maxlength="1">
      </div>
      <button class="modal-btn" id="verifyBtn">Continue</button>
      <p id="otpError" class="error"></p>
    </div>
  </div>
</div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#" onclick="showLanding()">Home</a>
  <a href="#" onclick="showDashboard()">My Bookings</a>
  <a href="#">Support</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
